version: '3.8'

services:
      
  orthanc:
    image: orthancteam/orthanc:latest
    container_name: orthanc
    ports:
      - '8042:8042'
      - '4242:4242'
    environment:
      - DICOM_WEB_PLUGIN_ENABLED=true
    volumes:
      - ./orthanc.json:/etc/orthanc/orthanc.json
    restart: unless-stopped
      
  orthanc-adapter:
    image: orthanc-adapter-dryrun:v1
    container_name: orthanc-adapter
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    restart: unless-stopped

  ohif:
    image: ohif-v3.11-custom-dryrun:v1
    ports:
      - "3000:80"
    # volumes:
    #   - ./app-config.js:/usr/share/nginx/html/app-config.js 
      
  todo-api:
    image: todo-api-dryrun:v1
    container_name: todo-api
    ports:
      - "5005:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    restart: unless-stopped

  todo-ui:
    image: todo-ui-dryrun:v1 
    container_name: todo-ui
    ports:
      - "4200:80"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - orthanc
      - ohif